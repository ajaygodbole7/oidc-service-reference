server:
  port: ${SERVER_PORT:8084}

management:
  server:
    port: ${MANAGEMENT_PORT:9084}
    address: ${MANAGEMENT_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: health

spring:
  application:
    name: catalog-service
  datasource:
    url: ${CATALOG_DATASOURCE_URL:jdbc:postgresql://postgres:5432/catalog_db}
    username: ${CATALOG_DATASOURCE_USERNAME:commerce}
    password: ${CATALOG_DATASOURCE_PASSWORD:LOCAL_DEV_POSTGRES_PASSWORD__CHANGE_BEFORE_DEPLOY}
  flyway:
    enabled: true

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-}] "

commerce:
  error:
    base-url: https://errors.example.com/catalog
  pagination:
    default-page-size: 20
    max-page-size: 100

catalog:
  oidc:
    issuer-uri: ${CATALOG_OIDC_ISSUER_URI:http://localhost:8080/realms/oidc-service-reference}
    audience: ${CATALOG_OIDC_AUDIENCE:commerce-api}
    jwks-uri: ${CATALOG_OIDC_JWKS_URI:http://keycloak:8080/realms/oidc-service-reference/protocol/openid-connect/certs}
  spicedb:
    target: ${CATALOG_SPICEDB_TARGET:spicedb:50051}
    preshared-key: ${CATALOG_SPICEDB_PRESHARED_KEY}
    plaintext: ${CATALOG_SPICEDB_PLAINTEXT:true}
