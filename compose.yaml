name: oidc-service-reference

# Local scaffold stack for the copied BFF/OIDC front door.
# Browser-facing entrypoints:
#   - http://127.0.0.1:9080  -> APISIX gateway for /auth/*
#   - http://127.0.0.1:8080  -> Keycloak realm discovery/login
#
# Domain services persist to local Postgres; Valkey remains the BFF session store.

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_DB: dev-file
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./authorization-server/realm:/opt/keycloak/data/import:ro
    networks:
      - oidc-internal
    healthcheck:
      test:
        - CMD-SHELL
        - >
          exec 3<>/dev/tcp/localhost/8080 &&
          printf 'GET /realms/oidc-service-reference/.well-known/openid-configuration HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          head -n1 <&3 | grep -q ' 200 '
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  valkey:
    image: valkey/valkey:9.1.0
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    networks:
      - oidc-internal
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot: create/upgrade SpiceDB's Postgres schema, then exit. spicedb waits for this to
  # complete successfully before it serves, so a fresh spicedb_db is migrated before first use.
  spicedb-migrate:
    image: ghcr.io/authzed/spicedb:v1.53.0
    command:
      - datastore
      - migrate
      - head
      - --datastore-engine=postgres
      - --datastore-conn-uri=postgres://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-LOCAL_DEV_POSTGRES_PASSWORD__CHANGE_BEFORE_DEPLOY}@postgres:5432/spicedb_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oidc-internal
    restart: "no"

  spicedb:
    image: ghcr.io/authzed/spicedb:v1.53.0
    command:
      - serve
      - --grpc-preshared-key=${SPICEDB_PRESHARED_KEY:-LOCAL_DEV_SPICEDB_PRESHARED_KEY__CHANGE_BEFORE_DEPLOY}
      - --http-enabled
      # Postgres-backed datastore: relationships persist across SpiceDB restarts (no reseed).
      # The schema and seed relationships are written once and survive; revocation immediacy is
      # handled by the consistency strategy (Zookie at_least_as_fresh + fully_consistent on the
      # revocation-check path), not by wiping state.
      - --datastore-engine=postgres
      - --datastore-conn-uri=postgres://${POSTGRES_USER:-commerce}:${POSTGRES_PASSWORD:-LOCAL_DEV_POSTGRES_PASSWORD__CHANGE_BEFORE_DEPLOY}@postgres:5432/spicedb_db?sslmode=disable
    ports:
      - "127.0.0.1:50051:50051"
      - "127.0.0.1:8443:8443"
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully
    networks:
      - oidc-internal
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=127.0.0.1:50051"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-commerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-LOCAL_DEV_POSTGRES_PASSWORD__CHANGE_BEFORE_DEPLOY}
      POSTGRES_DB: commerce
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - oidc-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-commerce} -d commerce"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  auth-service:
    build:
      context: ./auth-service
    environment:
      SERVER_PORT: 8081
      MANAGEMENT_PORT: 9081
      MANAGEMENT_ADDRESS: 127.0.0.1
      SPRING_DATA_REDIS_HOST: valkey
      APP_BASE_URL: ${APP_BASE_URL:-http://127.0.0.1:5173}
      OIDC_ISSUER_URI: http://localhost:8080/realms/oidc-service-reference
      APP_AUTHORIZATION_URI: http://localhost:8080/realms/oidc-service-reference/protocol/openid-connect/auth
      APP_TOKEN_URI: http://keycloak:8080/realms/oidc-service-reference/protocol/openid-connect/token
      APP_JWKS_URI: http://keycloak:8080/realms/oidc-service-reference/protocol/openid-connect/certs
      APP_END_SESSION_URI: http://localhost:8080/realms/oidc-service-reference/protocol/openid-connect/logout
      APP_COOKIE_SIGNING_KEY: ${CSRF_SIGNING_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      CSRF_SIGNING_KEY: ${CSRF_SIGNING_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      SPRING_PROFILES_ACTIVE: ${AUTH_SERVICE_SPRING_PROFILES_ACTIVE:-local}
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID:-commerce-auth}
      AUTH_CLIENT_SECRET: ${AUTH_CLIENT_SECRET:-LOCAL_DEV_AUTH_CLIENT_SECRET__CHANGE_BEFORE_DEPLOY}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid,profile,email,roles,api.audience,api.read,cart:read,cart:write,catalog:write,orders:read,orders:write}
      OIDC_ROLES_CLAIM_PATH: ${OIDC_ROLES_CLAIM_PATH:-realm_access,roles}
      APP_REFRESH_REQUIRE_ROTATION: ${APP_REFRESH_REQUIRE_ROTATION:-true}
      GATEWAY_CLIENT_ID: ${GATEWAY_CLIENT_ID:-commerce-api-gateway}
      INTERNAL_REFRESH_AUDIENCE: ${INTERNAL_REFRESH_AUDIENCE:-commerce-auth-internal}
      SESSION_IDLE_TTL: ${SESSION_IDLE_TTL:-1800}
      SESSION_MAX_TTL: ${SESSION_MAX_TTL:-28800}
    depends_on:
      keycloak:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - oidc-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    environment:
      SERVER_PORT: 8083
      MANAGEMENT_PORT: 9083
      MANAGEMENT_ADDRESS: 127.0.0.1
      CART_OIDC_ISSUER_URI: http://localhost:8080/realms/oidc-service-reference
      CART_OIDC_AUDIENCE: commerce-api
      CART_OIDC_JWKS_URI: http://keycloak:8080/realms/oidc-service-reference/protocol/openid-connect/certs
      CART_SPICEDB_TARGET: spicedb:50051
      CART_SPICEDB_PRESHARED_KEY: ${SPICEDB_PRESHARED_KEY:-LOCAL_DEV_SPICEDB_PRESHARED_KEY__CHANGE_BEFORE_DEPLOY}
      CART_SPICEDB_PLAINTEXT: "true"
      CART_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cart_db
      CART_DATASOURCE_USERNAME: ${POSTGRES_USER:-commerce}
      CART_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-LOCAL_DEV_POSTGRES_PASSWORD__CHANGE_BEFORE_DEPLOY}
      SPRING_PROFILES_ACTIVE: ${CART_SERVICE_SPRING_PROFILES_ACTIVE:-local}
    depends_on:
      keycloak:
        condition: service_healthy
      spicedb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - oidc-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    environment:
      SERVER_PORT: 8084
      MANAGEMENT_PORT: 9084
      MANAGEMENT_ADDRESS: 127.0.0.1
      CATALOG_OIDC_ISSUER_URI: http://localhost:8080/realms/oidc-service-reference
      CATALOG_OIDC_AUDIENCE: commerce-api
      CATALOG_OIDC_JWKS_URI: http://keycloak:8080/realms/oidc-service-reference/protocol/openid-connect/certs
      CATALOG_SPICEDB_TARGET: spicedb:50051
      CATALOG_SPICEDB_PRESHARED_KEY: ${SPICEDB_PRESHARED_KEY:-LOCAL_DEV_SPICEDB_PRESHARED_KEY__CHANGE_BEFORE_DEPLOY}
      CATALOG_SPICEDB_PLAINTEXT: "true"
      CATALOG_DATASOURCE_URL: jdbc:postgresql://postgres:5432/catalog_db
      CATALOG_DATASOURCE_USERNAME: ${POSTGRES_USER:-commerce}
      CATALOG_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-LOCAL_DEV_POSTGRES_PASSWORD__CHANGE_BEFORE_DEPLOY}
      SPRING_PROFILES_ACTIVE: ${CATALOG_SERVICE_SPRING_PROFILES_ACTIVE:-local}
    depends_on:
      keycloak:
        condition: service_healthy
      spicedb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - oidc-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    environment:
      SERVER_PORT: 8085
      MANAGEMENT_PORT: 9085
      MANAGEMENT_ADDRESS: 127.0.0.1
      PAYMENT_OIDC_ISSUER_URI: http://localhost:8080/realms/oidc-service-reference
      PAYMENT_OIDC_AUDIENCE: payment-service
      PAYMENT_OIDC_EXPECTED_CLIENT_ID: order-service
      PAYMENT_OIDC_REQUIRED_SCOPE: payments:authorize
      PAYMENT_OIDC_JWKS_URI: http://keycloak:8080/realms/oidc-service-reference/protocol/openid-connect/certs
      PAYMENT_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      PAYMENT_DATASOURCE_USERNAME: ${POSTGRES_USER:-commerce}
      PAYMENT_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-LOCAL_DEV_POSTGRES_PASSWORD__CHANGE_BEFORE_DEPLOY}
      SPRING_PROFILES_ACTIVE: ${PAYMENT_SERVICE_SPRING_PROFILES_ACTIVE:-local}
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - oidc-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      SERVER_PORT: 8086
      MANAGEMENT_PORT: 9086
      MANAGEMENT_ADDRESS: 127.0.0.1
      ORDER_OIDC_ISSUER_URI: http://localhost:8080/realms/oidc-service-reference
      ORDER_OIDC_AUDIENCE: commerce-api
      ORDER_OIDC_JWKS_URI: http://keycloak:8080/realms/oidc-service-reference/protocol/openid-connect/certs
      ORDER_SPICEDB_TARGET: spicedb:50051
      ORDER_SPICEDB_PRESHARED_KEY: ${SPICEDB_PRESHARED_KEY:-LOCAL_DEV_SPICEDB_PRESHARED_KEY__CHANGE_BEFORE_DEPLOY}
      ORDER_SPICEDB_PLAINTEXT: "true"
      ORDER_PAYMENT_AUTHORIZE_URI: http://payment-service:8085/internal/payments/authorize
      ORDER_PAYMENT_TOKEN_URI: http://keycloak:8080/realms/oidc-service-reference/protocol/openid-connect/token
      ORDER_PAYMENT_CLIENT_ID: order-service
      ORDER_PAYMENT_CLIENT_SECRET: ${ORDER_PAYMENT_CLIENT_SECRET:-LOCAL_DEV_SERVICE_CLIENT_SECRET__CHANGE_BEFORE_DEPLOY}
      ORDER_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      ORDER_DATASOURCE_USERNAME: ${POSTGRES_USER:-commerce}
      ORDER_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-LOCAL_DEV_POSTGRES_PASSWORD__CHANGE_BEFORE_DEPLOY}
      SPRING_PROFILES_ACTIVE: ${ORDER_SERVICE_SPRING_PROFILES_ACTIVE:-local}
    depends_on:
      keycloak:
        condition: service_healthy
      spicedb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    networks:
      - oidc-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  apisix:
    image: apache/apisix:3.16.0-debian
    depends_on:
      keycloak:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    environment:
      APISIX_STAND_ALONE: "true"
      TZ: "UTC"
      CSRF_SIGNING_KEY: ${CSRF_SIGNING_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      GATEWAY_CLIENT_SECRET: ${GATEWAY_CLIENT_SECRET:-LOCAL_DEV_GATEWAY_CLIENT_SECRET__CHANGE_BEFORE_DEPLOY}
    volumes:
      - ./api-gateway/config.yaml:/usr/local/apisix/conf/config.yaml
      - ./api-gateway/apisix.yaml.local:/usr/local/apisix/conf/apisix.yaml:ro
      - ./api-gateway/plugins/bff-session.lua:/usr/local/apisix/apisix/plugins/bff-session.lua:ro
    ports:
      - "127.0.0.1:9080:9080"
    networks:
      - oidc-internal
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9080"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

networks:
  oidc-internal:
    driver: bridge

volumes:
  postgres-data:
