server:
  port: ${SERVER_PORT:8086}

management:
  server:
    port: ${MANAGEMENT_PORT:9086}
    address: ${MANAGEMENT_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: health

spring:
  application:
    name: order-service
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: ${ORDER_DATASOURCE_URL:jdbc:postgresql://postgres:5432/order_db}
    username: ${ORDER_DATASOURCE_USERNAME:commerce}
    password: ${ORDER_DATASOURCE_PASSWORD:LOCAL_DEV_POSTGRES_PASSWORD__CHANGE_BEFORE_DEPLOY}
  flyway:
    enabled: true

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-}] "

commerce:
  error:
    base-url: https://errors.example.com/order

order:
  oidc:
    issuer-uri: ${ORDER_OIDC_ISSUER_URI:http://keycloak:8080/realms/oidc-service-reference}
    audience: ${ORDER_OIDC_AUDIENCE:commerce-api}
    jwks-uri: ${ORDER_OIDC_JWKS_URI:http://keycloak:8080/realms/oidc-service-reference/protocol/openid-connect/certs}
  spicedb:
    target: ${ORDER_SPICEDB_TARGET:spicedb:50051}
    # No dev key default, and the empty ":" default is load-bearing: an unset key then binds to ""
    # and fails @NotBlank at boot (fail-closed). Without the ":", @ConfigurationProperties leaves an
    # unresolved ${...} as the literal (non-blank) string and @NotBlank would pass — fail-open.
    preshared-key: ${SPICEDB_PRESHARED_KEY:}
    plaintext: ${ORDER_SPICEDB_PLAINTEXT:true}
  payment:
    authorize-uri: ${ORDER_PAYMENT_AUTHORIZE_URI:http://payment-service:8085/internal/payments/authorize}
    token-uri: ${ORDER_PAYMENT_TOKEN_URI:http://keycloak:8080/realms/oidc-service-reference/protocol/openid-connect/token}
    client-id: ${ORDER_PAYMENT_CLIENT_ID:order-service}
    client-secret: ${ORDER_PAYMENT_CLIENT_SECRET:LOCAL_DEV_SERVICE_CLIENT_SECRET__CHANGE_BEFORE_DEPLOY}
    connect-timeout: ${ORDER_PAYMENT_CONNECT_TIMEOUT:3s}
    read-timeout: ${ORDER_PAYMENT_READ_TIMEOUT:5s}
    max-attempts: ${ORDER_PAYMENT_MAX_ATTEMPTS:3}
    retry-backoff: ${ORDER_PAYMENT_RETRY_BACKOFF:200ms}
